name: CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build:ts

      - run: npm test

  prebuild:
    name: Prebuild (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-13
            arch: x64
          - os: windows-latest
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prebuildify --napi --strip

      - uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: prebuilds/

  publish:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: prebuild
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci --ignore-scripts

      - uses: actions/download-artifact@v4
        with:
          path: prebuilds/
          pattern: prebuilds-*
          merge-multiple: true

      - run: npm run build:ts

      - name: Verify package contents
        shell: bash
        run: |
          PACK_OUTPUT=$(npm pack --dry-run 2>&1)
          echo "$PACK_OUTPUT"
          echo "$PACK_OUTPUT" | grep -q "lib/index.js" || { echo "::error::Missing lib/index.js"; exit 1; }
          echo "$PACK_OUTPUT" | grep -q "lib/index.d.ts" || { echo "::error::Missing lib/index.d.ts"; exit 1; }
          echo "$PACK_OUTPUT" | grep -q "binding.gyp" || { echo "::error::Missing binding.gyp"; exit 1; }
          echo "$PACK_OUTPUT" | grep -q "prebuilds/" || { echo "::error::Missing prebuilds/"; exit 1; }

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
