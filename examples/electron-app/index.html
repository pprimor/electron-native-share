<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>electron-native-share example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #faf9f7;
      color: #2c2c2c;
      padding: 40px 36px;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 32px;
    }

    header h1 {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    #shareStatus {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 3px;
      position: relative;
      top: -1px;
    }

    #shareStatus.supported {
      background: #e8f4e9;
      color: #3a7d44;
    }

    #shareStatus.unsupported {
      background: #fceaea;
      color: #b74141;
    }

    .fields {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    input, textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: #2c2c2c;
      outline: none;
      transition: border-color 0.1s;
    }

    input::placeholder, textarea::placeholder {
      color: #bbb;
    }

    input:focus, textarea:focus {
      border-color: #999;
    }

    textarea {
      resize: vertical;
      min-height: 64px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    button {
      padding: 8px 20px;
      background: #2c2c2c;
      color: #faf9f7;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.1s;
    }

    button:hover { background: #444; }
    button:active { background: #1a1a1a; }

    #result {
      font-size: 13px;
      color: #999;
    }

    #result:not(:empty) {
      color: #666;
    }

    .file-picker {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .file-picker button {
      flex-shrink: 0;
      padding: 8px 14px;
      font-size: 12px;
      background: #f0efed;
      color: #2c2c2c;
      border: 1.5px solid #ddd;
    }

    .file-picker button:hover { background: #e5e4e1; }
    .file-picker button:active { background: #d8d7d4; }

    .file-list {
      font-size: 12px;
      color: #888;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .file-entry {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .file-entry .remove {
      padding: 0 4px;
      background: none;
      border: none;
      color: #b74141;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      line-height: 1;
    }

    .file-entry .remove:hover { color: #8a2020; }
  </style>
</head>
<body>
  <header>
    <h1>electron-native-share</h1>
    <span id="shareStatus" aria-live="polite"></span>
  </header>

  <div class="fields">
    <div>
      <label for="title">Title</label>
      <input type="text" id="title" placeholder="My cool project" />
    </div>

    <div>
      <label for="text">Text</label>
      <textarea id="text" placeholder="Check this out..."></textarea>
    </div>

    <div>
      <label for="url">URL</label>
      <input type="url" id="url" placeholder="https://github.com/user/repo" />
    </div>

    <div>
      <label>Files</label>
      <div class="file-picker">
        <button type="button" id="pickFilesBtn">Choose files…</button>
      </div>
      <div id="fileList" class="file-list"></div>
    </div>
  </div>

  <div class="actions">
    <button id="shareBtn">Share</button>
    <span id="result" aria-live="polite"></span>
  </div>

  <script>
    const statusEl = document.getElementById('shareStatus');
    const resultEl = document.getElementById('result');
    const fileListEl = document.getElementById('fileList');
    let selectedFiles = [];

    window.nativeShare.canShare().then(supported => {
      statusEl.textContent = supported ? 'native' : 'clipboard fallback';
      statusEl.className = supported ? 'supported' : 'unsupported';
    });

    function renderFileList() {
      fileListEl.innerHTML = '';
      selectedFiles.forEach((filePath, index) => {
        const entry = document.createElement('div');
        entry.className = 'file-entry';

        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove';
        removeBtn.textContent = '×';
        removeBtn.type = 'button';
        removeBtn.addEventListener('click', () => {
          selectedFiles.splice(index, 1);
          renderFileList();
        });

        const name = document.createElement('span');
        name.textContent = filePath.split(/[/\\]/).pop();
        name.title = filePath;

        entry.appendChild(removeBtn);
        entry.appendChild(name);
        fileListEl.appendChild(entry);
      });
    }

    document.getElementById('pickFilesBtn').addEventListener('click', async () => {
      const paths = await window.nativeShare.pickFiles();
      if (paths.length) {
        const existing = new Set(selectedFiles);
        for (const p of paths) {
          if (!existing.has(p)) selectedFiles.push(p);
        }
        renderFileList();
      }
    });

    document.getElementById('shareBtn').addEventListener('click', async () => {
      const options = {};
      const title = document.getElementById('title').value.trim();
      const text = document.getElementById('text').value.trim();
      const url = document.getElementById('url').value.trim();

      if (title) options.title = title;
      if (text) options.text = text;
      if (url) options.url = url;
      if (selectedFiles.length) options.files = selectedFiles;

      if (!title && !text && !url && !selectedFiles.length) {
        resultEl.textContent = 'Fill in at least one field';
        return;
      }

      try {
        const result = await window.nativeShare.share(options);
        resultEl.textContent = `${result.method}${result.native ? '' : ' (non-native)'}`;
      } catch (err) {
        resultEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>
